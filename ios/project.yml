# XcodeGen project spec for Kolaleaf iOS app.
# Generate the .xcodeproj with: cd ios && xcodegen generate
# Install xcodegen: brew install xcodegen

name: Kolaleaf
options:
  bundleIdPrefix: com.kolaleaf
  deploymentTarget:
    iOS: "17.2"
  developmentLanguage: en
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "5VCH6937XM" # Acuoos Pty Ltd
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CLANG_ENABLE_MODULES: YES
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: YES
    OTHER_SWIFT_FLAGS:
      - "-strict-concurrency=complete"

# Per-configuration overrides for App Attest environment + APS environment.
# r2 review fix #7: production attestation env in dev builds will fail every attestation;
# scope it per-config.
configs:
  Debug: debug
  Release: release

# ============== App Target ==============
targets:
  Kolaleaf:
    type: application
    platform: iOS
    sources:
      - path: Kolaleaf
        excludes:
          - "**/*.md"
    resources:
      - Kolaleaf/Resources/Assets.xcassets
      - Kolaleaf/Resources/Inter-fonts
      - Kolaleaf/Resources/Localizable.xcstrings
      - Kolaleaf/PrivacyInfo.xcprivacy
    info:
      path: Kolaleaf/Info.plist
      properties:
        CFBundleDisplayName: Kolaleaf
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: launchBackground
          UIImageName: LogoPrimary
          UIImageRespectsSafeAreaInsets: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # r2 fix #6: armv7 (32-bit) is invalid for iOS 17.2 (arm64-only). Removed key entirely;
        # iOS derives required architecture from the build slice.
        NSCameraUsageDescription: "Kolaleaf scans your photo ID and a selfie to verify your identity, as required for Australian money-transfer regulations. Images are processed by our identity provider Sumsub."
        NSMicrophoneUsageDescription: "Kolaleaf records a brief audio sample during identity verification (Sumsub liveness check)."
        NSFaceIDUsageDescription: "Kolaleaf uses Face ID to confirm transfers."
        NSPhotoLibraryAddUsageDescription: "Kolaleaf can save transfer receipts to your Photos."
        UIAppFonts:
          - Inter-Regular.ttf
          - Inter-Medium.ttf
          - Inter-SemiBold.ttf
          - Inter-Bold.ttf
          - Inter-ExtraBold.ttf
          - Inter-Black.ttf
        ITSAppUsesNonExemptEncryption: false
        # r2 fix #15: removed FileProtection from Info.plist — that key is not honored by iOS.
        # Data Protection class is set via the entitlement instead (see Kolaleaf.entitlements).
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        # ADV-P10A-C1 (Phase 10A iter-2): register the `kolaleaf://`
        # custom URL scheme that the Live Activity widget surfaces
        # (lock-screen + Dynamic Island) deep-link into. Without this,
        # the App Store review flags the unhandled scheme as a non-no-op
        # placeholder. Reverse-DNS bundle identifier is the convention.
        CFBundleURLTypes:
          - CFBundleURLName: com.kolaleaf.app
            CFBundleURLSchemes:
              - kolaleaf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kolaleaf.app
        TARGETED_DEVICE_FAMILY: "1,2" # iPhone + iPad (R1)
        ENABLE_PREVIEWS: YES
      configs:
        Debug:
          APP_ATTEST_ENVIRONMENT: development
          APS_ENVIRONMENT: development
        Release:
          APP_ATTEST_ENVIRONMENT: production
          APS_ENVIRONMENT: production
    entitlements:
      path: Kolaleaf/Kolaleaf.entitlements
      properties:
        aps-environment: $(APS_ENVIRONMENT)
        com.apple.security.application-groups:
          - group.com.kolaleaf.shared
        com.apple.developer.associated-domains:
          - applinks:kolaleaf.com.au
        com.apple.developer.devicecheck.appattest-environment: $(APP_ATTEST_ENVIRONMENT)
        com.apple.developer.default-data-protection: NSFileProtectionComplete
    dependencies:
      - target: KolaleafWidgets

  # ============== Widget Extension Target ==============
  KolaleafWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: KolaleafWidgets
        excludes:
          - "**/*.md"
      # Design tokens shared with the app target.
      # CA-1001 (iter-2): KolaTypography intentionally NOT included.
      # The widget views all use `.system(...)` fonts; the Inter `.ttf`
      # files aren't bundled with the extension, so KolaTypography
      # would silently fall back to system anyway. Drop the symbol
      # from the widget process entirely.
      # CA-1004 (iter-2): only the small `+Core.swift` token surface
      # is wired in — the migration aliases / Frosted namespace /
      # wallpaper stops in `KolaColors.swift` are app-only.
      - path: Kolaleaf/Design/Tokens/KolaColors+Core.swift
      - path: Kolaleaf/Design/Tokens/KolaSpacing.swift
      # ActivityKit attributes — same Codable type addressable on both
      # sides of the IPC boundary (Phase 10A · U66).
      - path: Kolaleaf/LiveActivities/KolaleafTransferAttributes.swift
      # OO-2001 + CA-2008 + ADV-P10B-C5 (Phase 10B iter-2): single
      # source of truth for the treasury-silent copy lint. Used by
      # widget views (lock-screen + Dynamic Island) AND by the
      # app-side `LiveActivityStageLabels` builder.
      - path: Kolaleaf/LiveActivities/LiveActivityCopyLint.swift
    info:
      path: KolaleafWidgets/Info.plist
      properties:
        CFBundleDisplayName: Kolaleaf Live Activity
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kolaleaf.app.widgets
    entitlements:
      path: KolaleafWidgets/KolaleafWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.kolaleaf.shared

  # ============== Test Targets ==============
  KolaleafTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: KolaleafTests
        excludes:
          # Wave 1 · U84: snapshot JSON is wired explicitly below with
          # `buildPhase: resources` so it ends up in the test bundle's
          # Resources phase (readable via Bundle.url(forResource:) at
          # runtime). Without the exclude xcodegen would also drop it
          # into Sources, which silently no-ops for `.json`.
          - "Networking/openapi-snapshot.json"
      # The OpenAPI 3.1 snapshot consumed by `OpenAPIContractTests`.
      # Regenerated by `npm run openapi:snapshot`. The contract test
      # decodes this file and asserts each curated iOS DTO can parse
      # a payload synthesised from the matching response schema.
      - path: KolaleafTests/Networking/openapi-snapshot.json
        buildPhase: resources
    dependencies:
      - target: Kolaleaf
      - package: SnapshotTesting
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kolaleaf.app.tests
        GENERATE_INFOPLIST_FILE: YES

  # r2 fix #12: KolaleafUITests had an empty source dir wired into the scheme — would
  # break xcodebuild test. Removed from project until Phase 12's actual UI tests land.
  # The directory may still exist for future use; xcodegen won't include it without a target.

  # Phase 10A · widget unit + snapshot tests for the Live Activity surfaces.
  KolaleafWidgetsTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      # Pull the widget's source files directly into the test target so
      # the test binary owns its own copy of every type. App-extension
      # binaries cannot host XCTest, and `@testable` against an .appex
      # leaves the symbols undefined at link time. Compiling the widget
      # sources into the test bundle is the canonical workaround used by
      # most production iOS app projects with widget extensions.
      # ADV-P10A-W9: yes, this means the widget code lives in three
      # binaries (.appex, the app, the test target). It is the
      # canonical pattern; xcodegen handles file dedup across paths.
      - KolaleafWidgetsTests
      - path: KolaleafWidgets
        excludes:
          - "**/*.md"
          # The @main entry would conflict with XCTest's own entry point
          # in the test bundle. Exclude it — tests don't need the bundle
          # registration; they exercise the surface views directly.
          - KolaleafWidgets.swift
      # Mirror the widget extension's design-token surface — Core only.
      # CA-1001 + CA-1004 (iter-2): KolaTypography stripped from the
      # widget process and KolaColors split.
      - path: Kolaleaf/Design/Tokens/KolaColors+Core.swift
      - path: Kolaleaf/Design/Tokens/KolaSpacing.swift
      - path: Kolaleaf/LiveActivities/KolaleafTransferAttributes.swift
      # iter-2: shared lint surface (see app + widget target sources).
      - path: Kolaleaf/LiveActivities/LiveActivityCopyLint.swift
    dependencies:
      - package: SnapshotTesting
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kolaleaf.app.widgets.tests
        GENERATE_INFOPLIST_FILE: YES
        # Test bundle hosts itself — no app/extension host required when
        # the widget sources compile in directly.

packages:
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: "1.17.0"

schemes:
  Kolaleaf:
    build:
      targets:
        Kolaleaf: all
        KolaleafWidgets: all
    test:
      gatherCoverageData: true
      coverageTargets:
        - Kolaleaf
        - KolaleafWidgets
      targets:
        - KolaleafTests
        - KolaleafWidgetsTests
    run:
      config: Debug
    archive:
      config: Release
