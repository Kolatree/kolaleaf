# XcodeGen project spec for Kolaleaf iOS app.
# Generate the .xcodeproj with: cd ios && xcodegen generate
# Install xcodegen: brew install xcodegen

name: Kolaleaf
options:
  bundleIdPrefix: com.kolaleaf
  deploymentTarget:
    iOS: "17.2"
  developmentLanguage: en
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "5VCH6937XM" # Acuoos Pty Ltd
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CLANG_ENABLE_MODULES: YES
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: YES
    OTHER_SWIFT_FLAGS:
      - "-strict-concurrency=complete"

# Per-configuration overrides for App Attest environment + APS environment.
# r2 review fix #7: production attestation env in dev builds will fail every attestation;
# scope it per-config.
configs:
  Debug: debug
  Release: release

# ============== App Target ==============
targets:
  Kolaleaf:
    type: application
    platform: iOS
    sources:
      - path: Kolaleaf
        excludes:
          - "**/*.md"
    resources:
      - Kolaleaf/Resources/Assets.xcassets
      - Kolaleaf/Resources/Inter-fonts
      - Kolaleaf/PrivacyInfo.xcprivacy
    info:
      path: Kolaleaf/Info.plist
      properties:
        CFBundleDisplayName: Kolaleaf
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: launchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # r2 fix #6: armv7 (32-bit) is invalid for iOS 17.2 (arm64-only). Removed key entirely;
        # iOS derives required architecture from the build slice.
        NSCameraUsageDescription: "Kolaleaf scans your photo ID and a selfie to verify your identity, as required for Australian money-transfer regulations. Images are processed by our identity provider Sumsub."
        NSMicrophoneUsageDescription: "Kolaleaf records a brief audio sample during identity verification (Sumsub liveness check)."
        NSFaceIDUsageDescription: "Kolaleaf uses Face ID to confirm transfers."
        NSPhotoLibraryAddUsageDescription: "Kolaleaf can save transfer receipts to your Photos."
        UIAppFonts:
          - Inter-Regular.ttf
          - Inter-Medium.ttf
          - Inter-SemiBold.ttf
          - Inter-Bold.ttf
          - Inter-ExtraBold.ttf
          - Inter-Black.ttf
        ITSAppUsesNonExemptEncryption: false
        # r2 fix #15: removed FileProtection from Info.plist — that key is not honored by iOS.
        # Data Protection class is set via the entitlement instead (see Kolaleaf.entitlements).
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kolaleaf.app
        TARGETED_DEVICE_FAMILY: "1,2" # iPhone + iPad (R1)
        ENABLE_PREVIEWS: YES
      configs:
        Debug:
          APP_ATTEST_ENVIRONMENT: development
          APS_ENVIRONMENT: development
        Release:
          APP_ATTEST_ENVIRONMENT: production
          APS_ENVIRONMENT: production
    entitlements:
      path: Kolaleaf/Kolaleaf.entitlements
      properties:
        aps-environment: $(APS_ENVIRONMENT)
        com.apple.security.application-groups:
          - group.com.kolaleaf.shared
        com.apple.developer.associated-domains:
          - applinks:kolaleaf.com.au
        com.apple.developer.devicecheck.appattest-environment: $(APP_ATTEST_ENVIRONMENT)
        com.apple.developer.default-data-protection: NSFileProtectionComplete
    dependencies:
      - target: KolaleafWidgets

  # ============== Widget Extension Target ==============
  KolaleafWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: KolaleafWidgets
        excludes:
          - "**/*.md"
    info:
      path: KolaleafWidgets/Info.plist
      properties:
        CFBundleDisplayName: Kolaleaf Live Activity
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kolaleaf.app.widgets
    entitlements:
      path: KolaleafWidgets/KolaleafWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.kolaleaf.shared

  # ============== Test Targets ==============
  KolaleafTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - KolaleafTests
    dependencies:
      - target: Kolaleaf
      - package: SnapshotTesting
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kolaleaf.app.tests
        GENERATE_INFOPLIST_FILE: YES

  # r2 fix #12: KolaleafUITests had an empty source dir wired into the scheme — would
  # break xcodebuild test. Removed from project until Phase 12's actual UI tests land.
  # The directory may still exist for future use; xcodegen won't include it without a target.

packages:
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: "1.17.0"

schemes:
  Kolaleaf:
    build:
      targets:
        Kolaleaf: all
        KolaleafWidgets: all
    test:
      gatherCoverageData: true
      coverageTargets:
        - Kolaleaf
      targets:
        - KolaleafTests
    run:
      config: Debug
    archive:
      config: Release
