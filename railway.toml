# Railway service configuration for Kolaleaf.
#
# Single-service shape: the Next.js web app handles HTTP, and at boot it
# spins up the in-process BullMQ webhook worker via Next.js instrumentation
# (see src/instrumentation.ts). One container, one Node process, web +
# worker share CPU. Defer splitting into separate services until launch
# traffic actually demands it.

[build]
# Nixpacks auto-detects Next.js. We override only to ensure the Prisma
# client is generated against the runtime's Node version, not the build
# image's cached one.
builder = "NIXPACKS"
buildCommand = "npm run build"

[deploy]
# Migrations run before the server starts so a deploy that introduces a
# new schema column doesn't serve traffic against the old shape. If
# `prisma migrate deploy` fails, the deploy fails — Railway keeps the
# previous container live.
startCommand = "npx prisma migrate deploy && npm run start"

# Kola health endpoint pings the DB. Railway promotes the new container
# to "active" only after this returns 200; broken DB or missing migration
# blocks rollout.
healthcheckPath = "/api/health"
healthcheckTimeout = 60

# Replace failed containers automatically (default 3 retries, exponential).
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# Cron schedules call our /api/cron/* routes via Railway's native cron.
# The cron-auth helper (Step 15a) gates each route with
# crypto.timingSafeEqual(CRON_SECRET); add CRON_SECRET to the Railway
# environment and configure each cron with header
# `Authorization: Bearer ${{CRON_SECRET}}`.
#
# NOTE: Railway crons are configured via the dashboard or `railway` CLI,
# not this file (the [[crons]] block is project-level, not service-level
# in current Railway TOML). Documented here so the schedules live in
# version control; the actual schedule entries get created by the deploy
# script in `scripts/setup-railway.sh` (or set up by hand once).
#
# Schedules (cron format, UTC):
#   /api/cron/rates           */15 * * * *   every 15 min
#   /api/cron/staleness       0 * * * *      hourly on the hour
#   /api/cron/float           */5 * * * *    every 5 min
#   /api/cron/reconciliation  0 1 * * *      daily at 01:00 UTC
